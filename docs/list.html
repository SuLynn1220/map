<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食地圖</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Noto Serif TC', Georgia, serif;
            background-color: #fdfbf7;
        }
        .color {
            background-color: #4a3525;
        }
        .nav-link, .navbar-brand {
            color: #f4f1ea !important;
        }
        .nav-link:hover {
            color: #d4a373 !important;
        }
        #filter-bar {
            background-color: #fff;
            border-bottom: 1px solid #e5ded1;
        }
        .tag-badge {
            background-color: #f0e6d6;
            color: #4a3525;
            margin-right: 4px;
        }
        table td {
            vertical-align: middle;
        }
        #empty-state {
            display: none;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg color">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">收藏店家名單</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto"> 
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">地圖</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">收藏名單</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#addShopModal" id="nav-add-shop">新增店家</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="filter-bar" class="py-3 px-4">
        <div class="row g-2 align-items-end">
            <div class="col-12 col-md-3">
                <label class="form-label small fw-bold mb-1">店名關鍵字</label>
                <input type="text" id="filter-name" class="form-control form-control-sm" placeholder="搜尋店名...">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label small fw-bold mb-1">標籤關鍵字</label>
                <input type="text" id="filter-tag" class="form-control form-control-sm" placeholder="搜尋標籤...">
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label small fw-bold mb-1">餐期分類</label>
                <select id="filter-category" class="form-select form-select-sm">
                    <option value="all">全部</option>
                    <option value="meal">正餐午晚餐</option>
                    <option value="dessert">下午茶甜點</option>
                </select>
            </div>
            <div class="col-12 col-md-3">
                <button id="filter-reset" class="btn btn-sm btn-outline-secondary w-100">清除篩選</button>
            </div>
        </div>
    </div>

    <div class="container-fluid px-4 py-3">
        <p class="small text-muted mb-2">共 <span id="result-count">0</span> 家店</p>

        <div class="table-responsive">
            <table class="table table-hover align-middle bg-white">
                <thead class="table-light">
                    <tr>
                        <th>店名</th>
                        <th>分類</th>
                        <th>標籤</th>
                        <th>私房心得</th>
                        <th class="text-end">操作</th>
                    </tr>
                </thead>
                <tbody id="shop-table-body"></tbody>
            </table>
        </div>

        <div id="empty-state" class="text-center text-muted py-5">
            <p class="mb-0">沒有符合條件的店家</p>
        </div>
    </div>

    <!-- 修改用表單 modal -->
    <div class="modal fade" id="editShopModal" tabindex="-1" aria-labelledby="editShopModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-primary" id="editShopModalLabel">修改店家資訊</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <form id="edit-shop-form">
                    <input type="hidden" id="shop-edit-index" value="">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">店名</label>
                            <input type="text" id="shop-name" class="form-control" required>
                        </div>
                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label small fw-bold">緯度</label>
                                <input type="number" id="shop-lat" class="form-control" step="any" required>
                            </div>
                            <div class="col">
                                <label class="form-label small fw-bold">經度</label>
                                <input type="number" id="shop-lng" class="form-control" step="any" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">餐期分類</label>
                            <select id="shop-category" class="form-select">
                                <option value="meal">正餐午晚餐</option>
                                <option value="dessert">下午茶甜點</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">甜點細項標籤（多個用逗號隔開）</label>
                            <input type="text" id="shop-tags" class="form-control" placeholder="布丁, 咖啡, 蛋糕">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">私房心得</label>
                            <textarea id="shop-desc" class="form-control" rows="3"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Google Maps 連結（選填，留空會自動依經緯度產生）</label>
                            <input type="url" id="shop-gmap" class="form-control" placeholder="https://maps.google.com/?q=...">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">更新店家資訊</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 刪除確認 modal -->
    <div class="modal fade" id="deleteShopModal" tabindex="-1" aria-labelledby="deleteShopModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-danger" id="deleteShopModalLabel">刪除店家</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0">確定要刪除「<strong id="delete-shop-name"></strong>」嗎？此動作無法復原。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="confirm-delete-btn" class="btn btn-danger">確認刪除</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // 從 localStorage 讀取資料（與 index.html 共用同一份資料）
        let myShops = JSON.parse(localStorage.getItem('myGourmetMapData')) || [];

        // --- 渲染表格 ---
        function renderTable() {
            const nameKeyword = $('#filter-name').val().trim().toLowerCase();
            const tagKeyword = $('#filter-tag').val().trim().toLowerCase();
            const category = $('#filter-category').val();

            const $tbody = $('#shop-table-body');
            $tbody.empty();

            let visibleCount = 0;

            for (let i = 0; i < myShops.length; i++) {
                const shop = myShops[i];

                const matchName = !nameKeyword || shop.name.toLowerCase().includes(nameKeyword);
                const matchTag = !tagKeyword || shop.tags.some(t => t.toLowerCase().includes(tagKeyword));
                const matchCategory = category === 'all' || shop.category === category;

                if (!(matchName && matchTag && matchCategory)) continue;

                visibleCount++;

                const tagsHtml = shop.tags.map(t => `<span class="badge tag-badge">${t}</span>`).join('');

                const row = `
                    <tr>
                        <td class="fw-bold">${shop.name}</td>
                        <td>
                            <span class="badge ${shop.category === 'meal' ? 'bg-success' : 'bg-danger'}">
                                ${shop.category === 'meal' ? '正餐' : '甜點'}
                            </span>
                        </td>
                        <td>${tagsHtml || '<span class="text-muted small">—</span>'}</td>
                        <td class="small text-muted" style="max-width: 280px;">${shop.description || ''}</td>
                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end">
                                <button type="button" class="btn btn-sm btn-outline-primary btn-locate-shop" data-index="${i}">看地圖</button>
                                <button type="button" class="btn btn-sm btn-outline-secondary btn-edit-shop" data-index="${i}">修改</button>
                                <button type="button" class="btn btn-sm btn-outline-danger btn-delete-shop" data-index="${i}">刪除</button>
                            </div>
                        </td>
                    </tr>
                `;
                $tbody.append(row);
            }

            $('#result-count').text(visibleCount);
            $('#empty-state').toggle(visibleCount === 0);
        }

        // --- 篩選器事件：輸入/選擇即時篩選 ---
        $('#filter-name, #filter-tag').on('input', renderTable);
        $('#filter-category').on('change', renderTable);
        $('#filter-reset').on('click', function() {
            $('#filter-name').val('');
            $('#filter-tag').val('');
            $('#filter-category').val('all');
            renderTable();
        });

        // --- 「看地圖」按鈕：帶經緯度跳回地圖頁並定位 ---
        $(document).on('click', '.btn-locate-shop', function() {
            const index = parseInt($(this).data('index'), 10);
            const shop = myShops[index];
            window.location.href = `index.html?lat=${shop.lat}&lng=${shop.lng}`;
        });

        // --- 「修改」按鈕：把資料填回表單並開啟 modal ---
        $(document).on('click', '.btn-edit-shop', function() {
            const index = parseInt($(this).data('index'), 10);
            const shop = myShops[index];

            $('#shop-edit-index').val(index);
            $('#shop-name').val(shop.name);
            $('#shop-lat').val(shop.lat);
            $('#shop-lng').val(shop.lng);
            $('#shop-category').val(shop.category);
            $('#shop-tags').val(shop.tags.join(', '));
            $('#shop-desc').val(shop.description);
            $('#shop-gmap').val(shop.googleMapUrl || '');

            $('#editShopModal').modal('show');
        });

        // --- 修改表單送出：覆蓋原本那一筆資料 ---
        $('#edit-shop-form').on('submit', function(e) {
            e.preventDefault();

            const editIndex = parseInt($('#shop-edit-index').val(), 10);

            const name = $('#shop-name').val();
            const lat = parseFloat($('#shop-lat').val());
            const lng = parseFloat($('#shop-lng').val());
            const category = $('#shop-category').val();
            const tagsInput = $('#shop-tags').val();
            const tags = tagsInput ? tagsInput.replace(/，/g, ',').split(',').map(t => t.trim()).filter(Boolean) : [];
            const description = $('#shop-desc').val();
            const googleMapUrl = $('#shop-gmap').val().trim();

            myShops[editIndex] = { name, lat, lng, category, tags, description, googleMapUrl };
            localStorage.setItem('myGourmetMapData', JSON.stringify(myShops));

            renderTable();
            $('#editShopModal').modal('hide');
        });

        // --- 「刪除」按鈕：跳出確認 modal ---
        let pendingDeleteIndex = null;
        $(document).on('click', '.btn-delete-shop', function() {
            const index = parseInt($(this).data('index'), 10);
            pendingDeleteIndex = index;
            $('#delete-shop-name').text(myShops[index].name);
            $('#deleteShopModal').modal('show');
        });

        // --- 確認刪除：真正從陣列移除 ---
        $('#confirm-delete-btn').on('click', function() {
            if (pendingDeleteIndex === null) return;

            myShops.splice(pendingDeleteIndex, 1);
            localStorage.setItem('myGourmetMapData', JSON.stringify(myShops));
            renderTable();

            pendingDeleteIndex = null;
            $('#deleteShopModal').modal('hide');
        });

        // 頁面載入完成後第一次繪製表格
        $(document).ready(function() { renderTable(); });
    </script>
</body>
</html>
