<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美食地圖</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Noto Serif TC', Georgia, serif;
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        #main-container { 
            flex: 1; 
            display: flex; 
            height: calc(100vh - 56px); 
            position: relative;
        }
        #sidebar { 
            width: 380px; 
            overflow-y: auto; 
            background-color: #fdfbf7; 
        }
        #map { 
            flex: 1; 
            height: 100%; 
        }
        .color {
            background-color: #4a3525;
        }
        .nav-link, .navbar-brand {
            color: #f4f1ea !important;
        }
        .nav-link:hover {
            color: #d4a373 !important;
        }
        #map-filter-panel {
            position: absolute;
            top: 16px;
            left: 16px;
            z-index: 1000;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            padding: 12px 14px;
            width: 240px;
        }
        #map-filter-panel .form-label {
            margin-bottom: 2px;
        }
        #map-filter-reset {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg color">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">收藏店家名單</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ms-auto"> 
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">地圖</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="list.html">收藏名單</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#addShopModal" id="nav-add-shop">新增店家</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="addShopModal" tabindex="-1" aria-labelledby="addShopModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered"> <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title fw-bold text-primary" id="addShopModalLabel">新增私房愛店</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            
            <form id="add-shop-form">
                <input type="hidden" id="shop-edit-index" value="">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">店名</label>
                        <input type="text" id="shop-name" class="form-control" required placeholder="例如：昭和喫茶店">
                    </div>
                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label small fw-bold">緯度</label>
                            <input type="number" id="shop-lat" class="form-control" step="any" required placeholder="25.0465">
                        </div>
                        <div class="col">
                            <label class="form-label small fw-bold">經度</label>
                            <input type="number" id="shop-lng" class="form-control" step="any" required placeholder="121.5160">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">餐期分類</label>
                        <select id="shop-category" class="form-select">
                            <option value="meal">正餐午晚餐</option>
                            <option value="dessert">下午茶甜點</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">甜點細項標籤（多個用逗號隔開）</label>
                        <input type="text" id="shop-tags" class="form-control" placeholder="布丁, 咖啡, 蛋糕">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">私房心得</label>
                        <textarea id="shop-desc" class="form-control" rows="3" placeholder="推薦吃什麼？口感如何？"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Google Maps 連結（選填，留空會自動依經緯度產生）</label>
                        <input type="url" id="shop-gmap" class="form-control" placeholder="https://maps.google.com/?q=...">
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" id="shop-submit-btn" class="btn btn-primary">儲存到地圖</button>
                </div>
            </form>

            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteShopModal" tabindex="-1" aria-labelledby="deleteShopModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold text-danger" id="deleteShopModalLabel">刪除店家</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="mb-0">確定要刪除「<strong id="delete-shop-name"></strong>」嗎？此動作無法復原。</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="confirm-delete-btn" class="btn btn-danger">確認刪除</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-container">

        <div id="map-filter-panel">
            <div class="mb-2">
                <label class="form-label small fw-bold">店名關鍵字</label>
                <input type="text" id="map-filter-name" class="form-control form-control-sm" placeholder="搜尋店名...">
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">標籤關鍵字</label>
                <input type="text" id="map-filter-tag" class="form-control form-control-sm" placeholder="搜尋標籤...">
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold">餐期分類</label>
                <select id="map-filter-category" class="form-select form-select-sm">
                    <option value="all">全部</option>
                    <option value="meal">正餐午晚餐</option>
                    <option value="dessert">下午茶甜點</option>
                </select>
            </div>
            <button id="map-filter-reset" class="btn btn-sm btn-outline-secondary w-100">清除篩選</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // 從 localStorage 讀取資料，如果沒有資料，就用空陣列起步
        let myShops = JSON.parse(localStorage.getItem('myGourmetMapData')) || [];

        // --- 2. 初始化地圖 ---
        const map = L.map('map', { zoomControl: false }).setView([25.0478, 121.5170], 15);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        let markerGroup = L.layerGroup().addTo(map);

        // --- 3. 地圖渲染功能 ---
        function renderMap() {
            // Step 1: 把舊的地標全部拿橡皮擦擦掉！
            markerGroup.clearLayers();

            // Step 2: 抓取目前篩選面板上的條件
            const nameKeyword = $('#map-filter-name').val().trim().toLowerCase();
            const tagKeyword = $('#map-filter-tag').val().trim().toLowerCase();
            const category = $('#map-filter-category').val();

            // Step 3: 把符合篩選條件的店畫上去
            for (let i = 0; i < myShops.length; i++) {
                const shop = myShops[i];

                const matchName = !nameKeyword || shop.name.toLowerCase().includes(nameKeyword);
                const matchTag = !tagKeyword || shop.tags.some(t => t.toLowerCase().includes(tagKeyword));
                const matchCategory = category === 'all' || shop.category === category;

                if (!(matchName && matchTag && matchCategory)) continue;

                // 在該店家的經緯度上建立一支旗子 (Marker)
                const marker = L.marker([shop.lat, shop.lng]);

                // 若沒有自訂 Google Maps 連結，就用經緯度自動產生一個
                const gmapUrl = shop.googleMapUrl && shop.googleMapUrl.trim()
                    ? shop.googleMapUrl
                    : `https://www.google.com/maps/search/?api=1&query=${shop.lat},${shop.lng}`;

                // 寫好點擊旗子時要彈出來的 HTML 氣泡窗內容
                // data-index 記錄這家店在 myShops 陣列中的位置，供修改/刪除按鈕使用
                const popupContent = `
                    <div class="p-1">
                        <h6 class="fw-bold mb-1">${shop.name}</h6>
                        <span class="badge ${shop.category === 'meal' ? 'bg-success' : 'bg-danger'} mb-2">
                            ${shop.category === 'meal' ? '正餐' : '甜點'}
                        </span>
                        <p class="text-muted small mb-1">標籤：${shop.tags.join(', ')}</p>
                        <hr class="my-1">
                        <p class="mb-2 small text-dark">${shop.description}</p>
                        <a href="${gmapUrl}" target="_blank" rel="noopener" class="btn btn-sm btn-outline-primary w-100 mb-2">
                            在 Google Maps 開啟
                        </a>
                        <div class="d-flex gap-2">
                            <button type="button" class="btn btn-sm btn-outline-secondary flex-fill btn-edit-shop" data-index="${i}">修改</button>
                            <button type="button" class="btn btn-sm btn-outline-danger flex-fill btn-delete-shop" data-index="${i}">刪除</button>
                        </div>
                    </div>
                `;

                marker.bindPopup(popupContent); // 綁定氣泡
                markerGroup.addLayer(marker);   // 把這支旗子釘在透明畫布層上！
            }
        }

        // --- 4. 【核心功能】監聽表單送出（新增 / 修改店家共用此表單） ---
        $('#add-shop-form').on('submit', function(e) {
            e.preventDefault(); // 防止表單重整網頁

            // 抓取輸入欄位的值
            const name = $('#shop-name').val();
            const lat = parseFloat($('#shop-lat').val());
            const lng = parseFloat($('#shop-lng').val());
            const category = $('#shop-category').val();
            
            const tagsInput = $('#shop-tags').val();
            const tags = tagsInput ? tagsInput.replace(/，/g, ',').split(',').map(t => t.trim()) : [];
            const description = $('#shop-desc').val();
            const googleMapUrl = $('#shop-gmap').val().trim();

            const shopData = { name, lat, lng, category, tags, description, googleMapUrl };

            // 判斷目前是新增還是修改模式：editIndex 有值就是修改
            const editIndexRaw = $('#shop-edit-index').val();
            const isEditMode = editIndexRaw !== '';

            if (isEditMode) {
                const editIndex = parseInt(editIndexRaw, 10);
                myShops[editIndex] = shopData; // 用新資料覆蓋原本那一筆
            } else {
                myShops.push(shopData); // 新增一筆到陣列尾端
            }
            localStorage.setItem('myGourmetMapData', JSON.stringify(myShops));

            // 重新渲染地圖
            renderMap();

            // 💡 利用 jQuery 叫 Bootstrap 把彈出方框關閉
            $('#addShopModal').modal('hide');

            // 清空表單輸入欄位與編輯狀態
            this.reset();
            $('#shop-edit-index').val('');

            // 把地圖中心移到該店家，並在動畫結束後自動打開該店家資訊
            map.flyTo([lat, lng], 17, { duration: 1.2 });
            map.once('moveend', function() {
                markerGroup.eachLayer(function(marker) {
                    const pos = marker.getLatLng();
                    if (pos.lat === lat && pos.lng === lng) {
                        marker.openPopup();
                    }
                });
            });
        });

        // --- 4b. 開啟「新增」modal 時，確保表單回到新增模式（清空、標題還原） ---
        $('#nav-add-shop').on('click', function() {
            $('#add-shop-form')[0].reset();
            $('#shop-edit-index').val('');
            $('#addShopModalLabel').text('新增我的私房愛店');
            $('#shop-submit-btn').text('儲存到地圖');
        });

        // --- 4c. 點擊圖釘 popup 裡的「修改」按鈕：把該店資料填回表單，切換成修改模式 ---
        $(document).on('click', '.btn-edit-shop', function() {
            const index = parseInt($(this).data('index'), 10);
            const shop = myShops[index];

            $('#shop-edit-index').val(index);
            $('#shop-name').val(shop.name);
            $('#shop-lat').val(shop.lat);
            $('#shop-lng').val(shop.lng);
            $('#shop-category').val(shop.category);
            $('#shop-tags').val(shop.tags.join(', '));
            $('#shop-desc').val(shop.description);
            $('#shop-gmap').val(shop.googleMapUrl || '');

            $('#addShopModalLabel').text('修改店家資訊');
            $('#shop-submit-btn').text('更新店家資訊');

            map.closePopup();
            $('#addShopModal').modal('show');
        });

        // --- 4d. 點擊圖釘 popup 裡的「刪除」按鈕：先記住要刪哪一筆，跳出確認視窗 ---
        let pendingDeleteIndex = null;
        $(document).on('click', '.btn-delete-shop', function() {
            const index = parseInt($(this).data('index'), 10);
            pendingDeleteIndex = index;
            $('#delete-shop-name').text(myShops[index].name);

            map.closePopup();
            $('#deleteShopModal').modal('show');
        });

        // --- 4e. 確認刪除按鈕：真正從陣列移除該店家並更新地圖 ---
        $('#confirm-delete-btn').on('click', function() {
            if (pendingDeleteIndex === null) return;

            myShops.splice(pendingDeleteIndex, 1);
            localStorage.setItem('myGourmetMapData', JSON.stringify(myShops));
            renderMap();

            pendingDeleteIndex = null;
            $('#deleteShopModal').modal('hide');
        });

        // --- 4f. 地圖篩選面板：輸入/選擇即時套用篩選 ---
        $('#map-filter-name, #map-filter-tag').on('input', renderMap);
        $('#map-filter-category').on('change', renderMap);
        $('#map-filter-reset').on('click', function() {
            $('#map-filter-name').val('');
            $('#map-filter-tag').val('');
            $('#map-filter-category').val('all');
            renderMap();
        });

        // --- 5. 【進階功能】匯出 JSON 檔案 ---
        $('#btn-export').on('click', function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(myShops, null, 2));
            const downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", "shops.json");
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        });

        // 頁面載入完成後第一次繪製，並檢查網址參數是否要定位到特定店家
        // （從收藏名單頁點「看地圖」會帶上 ?lat=...&lng=... 過來）
        $(document).ready(function() {
            renderMap();

            const urlParams = new URLSearchParams(window.location.search);
            const targetLat = parseFloat(urlParams.get('lat'));
            const targetLng = parseFloat(urlParams.get('lng'));

            if (!isNaN(targetLat) && !isNaN(targetLng)) {
                // 清空篩選條件，確保目標店家一定會被畫出來
                $('#map-filter-name').val('');
                $('#map-filter-tag').val('');
                $('#map-filter-category').val('all');
                renderMap();

                map.flyTo([targetLat, targetLng], 17, { duration: 1.2 });
                map.once('moveend', function() {
                    markerGroup.eachLayer(function(marker) {
                        const pos = marker.getLatLng();
                        if (pos.lat === targetLat && pos.lng === targetLng) {
                            marker.openPopup();
                        }
                    });
                });
            }
        });
    </script>
</body>
</html>
